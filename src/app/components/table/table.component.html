<div class="ramadan-dates-table">
  <table mat-table [dataSource]="displayedRamadanTimes()" class="mat-elevation-z8">

    <!-- Position Column -->
    <ng-container matColumnDef="date">
      <th mat-header-cell *matHeaderCellDef> DATE </th>
      <td mat-cell *matCellDef="let element">
        <div class="dates">
          <span>{{element.date | date}}</span>
          <span>{{element.dateHijri}} Ramadan</span>
        </div>
      </td>
    </ng-container>

    <!-- Name Column -->
    <ng-container matColumnDef="sehri">
      <th mat-header-cell *matHeaderCellDef> IMSAK </th>
      <td mat-cell *matCellDef="let element"> {{element.sehri.split('T')[1]}} </td>
    </ng-container>

    <!-- Weight Column -->
    <ng-container matColumnDef="iftar">
      <th mat-header-cell *matHeaderCellDef> IFTAR </th>
      <td mat-cell *matCellDef="let element"> {{element.iftaar.split('T')[1]}} </td>
    </ng-container>

    <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
    <tr mat-row *matRowDef="let row; columns: displayedColumns;" [class.today-row]="row.isToday"></tr>
  </table>
</div>
